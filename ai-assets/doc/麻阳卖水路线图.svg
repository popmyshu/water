<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" width="100%" height="100%">

  <!-- 背景 -->
  <rect width="1000" height="1400" fill="#f5f8f0"/>
  
  <!-- 标题 -->
  <rect x="0" y="0" width="1000" height="80" fill="#2d8a4e"/>
  <text x="500" y="35" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="sans-serif">🚛 西晃山天然矿泉水</text>
  <text x="500" y="62" text-anchor="middle" fill="#c8e6c9" font-size="18" font-family="sans-serif">麻阳送水路线图 · 每日固定路线</text>

  <!-- 图例 -->
  <rect x="30" y="100" width="940" height="55" rx="10" fill="white" stroke="#ddd"/>
  <circle cx="60" cy="128" r="12" fill="#2d8a4e"/><text x="80" y="133" fill="#333" font-size="14" font-family="sans-serif">水源/装水点</text>
  <rect x="200" y="118" width="24" height="20" rx="4" fill="#ff8f00"/><text x="232" y="133" fill="#333" font-size="14" font-family="sans-serif">集镇（重点区域）</text>
  <circle cx="430" cy="128" r="8" fill="#2979ff"/><text x="446" y="133" fill="#333" font-size="14" font-family="sans-serif">村庄/村组</text>
  <rect x="590" y="118" width="24" height="20" rx="4" fill="#e53935"/><text x="622" y="133" fill="#333" font-size="14" font-family="sans-serif">县城（收尾）</text>

  <!-- 路线主线条 -->
  <!-- 阶段1: 西皮溪 → 文昌阁 (绿色) -->
  <path d="M 500,200 L 500,280" stroke="#43a047" stroke-width="5" fill="none" stroke-dasharray="8,4"/>
  <path d="M 500,280 Q 500,310 420,340 L 300,380" stroke="#43a047" stroke-width="5" fill="none"/>
  
  <!-- 阶段2: 文昌阁 → 黄家团等 -->
  <path d="M 300,380 L 300,430" stroke="#2d8a4e" stroke-width="5" fill="none"/>
  <path d="M 300,430 Q 300,460 350,490 L 450,530" stroke="#2d8a4e" stroke-width="5" fill="none"/>
  <path d="M 450,530 L 450,570" stroke="#2d8a4e" stroke-width="5" fill="none"/>
  <path d="M 450,570 Q 450,600 500,630 L 550,670" stroke="#2d8a4e" stroke-width="5" fill="none"/>

  <!-- 阶段3: → 锦和集镇 -->
  <path d="M 550,670 L 550,720" stroke="#ff8f00" stroke-width="7" fill="none"/>

  <!-- 阶段4: → 寒池坳 → 谭家寨 -->
  <path d="M 550,780 L 450,830 L 400,870" stroke="#2d8a4e" stroke-width="5" fill="none"/>

  <!-- 阶段5: → 岩门集镇 -->
  <path d="M 400,870 Q 400,900 450,930 L 550,970" stroke="#ff8f00" stroke-width="7" fill="none"/>

  <!-- 阶段6: → 大塘 -->
  <path d="M 550,1020 L 550,1060 L 500,1100" stroke="#2d8a4e" stroke-width="5" fill="none"/>

  <!-- 阶段7: → 麻阳县城 -->
  <path d="M 500,1100 Q 500,1130 550,1160 L 650,1200" stroke="#e53935" stroke-width="7" fill="none"/>
  <path d="M 650,1200 L 650,1280" stroke="#e53935" stroke-width="7" fill="none"/>

  <!-- ===== 地点标记 ===== -->
  
  <!-- 0. 西皮溪 水源 -->
  <circle cx="500" cy="180" r="16" fill="#2d8a4e" stroke="white" stroke-width="3"/>
  <text x="500" y="185" text-anchor="middle" fill="white" font-size="16" font-weight="bold">🏠</text>
  <text x="500" y="165" text-anchor="middle" fill="#2d8a4e" font-size="15" font-weight="bold">西皮溪 🚰装水</text>
  <text x="500" y="210" text-anchor="middle" fill="#888" font-size="12">06:00 出发</text>

  <!-- 1. 文西新村 -->
  <circle cx="500" cy="260" r="10" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" fill="white" font-size="12" font-weight="bold">→</text>
  <text x="515" y="255" fill="#2979ff" font-size="14">文西新村</text>

  <!-- 2. 文昌阁集镇 -->
  <rect x="235" y="365" width="130" height="35" rx="8" fill="#ff8f00" stroke="white" stroke-width="2"/>
  <text x="300" y="388" text-anchor="middle" fill="white" font-size="15" font-weight="bold">文昌阁集镇 ⭐</text>
  <text x="300" y="410" text-anchor="middle" fill="#888" font-size="11">06:20-07:00</text>

  <!-- 3. 黄家团 -->
  <circle cx="300" cy="450" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="320" y="455" fill="#2979ff" font-size="14">黄家团</text>

  <!-- 4. 兰家坪 -->
  <circle cx="350" cy="510" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="370" y="515" fill="#2979ff" font-size="14">兰家坪</text>

  <!-- 5. 滑石江 -->
  <circle cx="450" cy="555" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="470" y="560" fill="#2979ff" font-size="14">滑石江</text>

  <!-- 6. 官村 -->
  <circle cx="550" cy="650" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="570" y="655" fill="#2979ff" font-size="14">官村</text>
  <text x="350" y="620" fill="#888" font-size="11">07:00-09:00 跑这一片</text>

  <!-- 7. 锦和集镇 ⭐⭐⭐ -->
  <rect x="460" y="720" width="180" height="45" rx="10" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
  <text x="550" y="740" text-anchor="middle" fill="white" font-size="17" font-weight="bold">🔥 锦和集镇 ⭐⭐⭐</text>
  <text x="550" y="758" text-anchor="middle" fill="#fff3e0" font-size="12">09:00-11:30 重点！人口最密集</text>

  <!-- 时间标注 午休 -->
  <rect x="480" y="790" width="140" height="28" rx="14" fill="#e0e0e0"/>
  <text x="550" y="809" text-anchor="middle" fill="#666" font-size="13">🍚 午饭休整 11:30-13:00</text>

  <!-- 8. 寒池坳 -->
  <circle cx="400" cy="850" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="420" y="855" fill="#2979ff" font-size="14">寒池坳</text>

  <!-- 9. 谭家寨 -->
  <circle cx="400" cy="890" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="420" y="895" fill="#2979ff" font-size="14">谭家寨</text>
  <text x="280" y="880" fill="#888" font-size="11">13:00-14:00</text>

  <!-- 10. 岩门集镇 ⭐⭐ -->
  <rect x="460" y="965" width="180" height="45" rx="10" fill="#ff8f00" stroke="#e65100" stroke-width="2"/>
  <text x="550" y="985" text-anchor="middle" fill="white" font-size="17" font-weight="bold">岩门集镇 ⭐⭐</text>
  <text x="550" y="1003" text-anchor="middle" fill="#fff3e0" font-size="12">14:00-16:00 第二大集镇</text>

  <!-- 11. 大路坳 -->
  <circle cx="550" cy="1035" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="570" y="1040" fill="#2979ff" font-size="14">大路坳</text>

  <!-- 12. 大塘 -->
  <circle cx="500" cy="1090" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="520" y="1095" fill="#2979ff" font-size="14">大塘</text>
  <text x="350" y="1080" fill="#888" font-size="11">16:00-17:00</text>

  <!-- 13. 枫木林 -->
  <circle cx="590" cy="1140" r="8" fill="#2979ff" stroke="white" stroke-width="2"/>
  <text x="610" y="1145" fill="#2979ff" font-size="14">枫木林</text>

  <!-- 14. 麻阳县城 城东 -->
  <rect x="530" y="1200" width="240" height="65" rx="12" fill="#e53935" stroke="white" stroke-width="2"/>
  <text x="650" y="1225" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🏢 麻阳县城 · 城东</text>
  <text x="650" y="1248" text-anchor="middle" fill="#ffcdd2" font-size="13">城东一期 → 城东二期 → 城东三期</text>
  <text x="650" y="1268" text-anchor="middle" fill="#ffcdd2" font-size="13">马兰廉租房</text>
  <text x="830" y="1260" fill="#888" font-size="11">17:00-18:30</text>

  <!-- 收工 -->
  <rect x="400" y="1320" width="200" height="35" rx="17" fill="#1a6b3a"/>
  <text x="500" y="1343" text-anchor="middle" fill="white" font-size="16" font-weight="bold">✅ 18:30 收工回家！</text>

  <!-- 装饰：箭头标记 -->
  <polygon points="495,280 500,295 505,280" fill="#43a047"/>
  <polygon points="295,380 305,395 315,380" fill="#43a047"/>
  <polygon points="545,670 555,685 565,670" fill="#2d8a4e"/>
  <polygon points="545,720 555,735 565,720" fill="#ff8f00"/>
  <polygon points="395,870 405,885 415,870" fill="#2d8a4e"/>
  <polygon points="545,970 555,985 565,970" fill="#ff8f00"/>
  <polygon points="495,1100 505,1115 515,1100" fill="#2d8a4e"/>
  <polygon points="645,1200 655,1215 665,1200" fill="#e53935"/>

  <!-- 里程概览 -->
  <rect x="30" y="180" width="200" height="120" rx="10" fill="white" stroke="#ddd" opacity="0.95"/>
  <text x="130" y="205" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">📏 路线概览</text>
  <text x="45" y="228" fill="#555" font-size="13">🚩 全程约 50-60 公里</text>
  <text x="45" y="248" fill="#555" font-size="13">🏪 途经 4个集镇</text>
  <text x="45" y="268" fill="#555" font-size="13">🏘️ 覆盖 10+ 个村组</text>
  <text x="45" y="288" fill="#555" font-size="13">🏢 县城城东全面覆盖</text>

  <!-- 每日提醒 -->
  <rect x="30" y="320" width="200" height="90" rx="10" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="130" y="345" text-anchor="middle" fill="#2d8a4e" font-size="13" font-weight="bold">💡 核心操作</text>
  <text x="45" y="365" fill="#333" font-size="12">① 西皮溪装水 → 沿路跑</text>
  <text x="45" y="383" fill="#333" font-size="12">② 锦和/岩门重点停留</text>
  <text x="45" y="401" fill="#333" font-size="12">③ 县城收尾下班回家</text>

</svg>