<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻阳百事通 三人聊天室</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
/* ========== 设置遮罩 ========== */
#setupOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
#setupBox {
  background: #fff; border-radius: 16px; padding: 30px 28px; width: 340px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
#setupBox h2 { font-size: 20px; margin-bottom: 6px; color: #1a1a2e; }
#setupBox p { font-size: 13px; color: #888; margin-bottom: 16px; }
#setupBox input, #setupBox select {
  width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid #ddd; border-radius: 10px;
  margin-bottom: 12px; outline: none;
}
#setupBox input:focus, #setupBox select:focus { border-color: #e94560; }
#setupBox button {
  width: 100%; padding: 12px; font-size: 16px; background: #e94560; color: #fff;
  border: none; border-radius: 10px; cursor: pointer; font-weight: 600;
}
#setupBox button:hover { background: #d63851; }
.my-identity { margin: 10px 0; font-size: 14px; color: #555; }

/* ========== 主界面 ========== */
#mainUI { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; }
#header {
  background: #1a1a2e; color: #fff; padding: 14px 18px; display: flex;
  justify-content: space-between; align-items: center; border-radius: 0 0 12px 12px;
  flex-shrink: 0;
}
#header h1 { font-size: 16px; font-weight: 600; }
#header .status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.green { background: #4ade80; }
.dot.yellow { background: #fbbf24; }
.dot.red { background: #ef4444; }
#header .tool-btn {
  background: rgba(255,255,255,0.12); color: #fff; border: none;
  padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
}

/* ========== 消息列表 ========== */
#msgContainer {
  flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column;
  gap: 2px; scroll-behavior: smooth;
}
.msg-date-divider {
  text-align: center; font-size: 11px; color: #aaa; margin: 8px 0;
}
.msg-row { display: flex; margin-bottom: 6px; }
.msg-row.huahua { justify-content: flex-start; }
.msg-row.doudou { justify-content: flex-start; }
.msg-row.xiaocai { justify-content: flex-end; }

.msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.5; position: relative; }
.msg-bubble .sender-tag { font-size: 11px; font-weight: 600; margin-bottom: 3px; opacity: 0.7; }
.msg-bubble .msg-time { font-size: 10px; color: rgba(0,0,0,0.35); text-align: right; margin-top: 3px; }

.huahua .msg-bubble { background: #e8f5e9; border-bottom-left-radius: 4px; }
.huahua .sender-tag { color: #2e7d32; }
.doudou .msg-bubble { background: #fff3e0; border-bottom-left-radius: 4px; }
.doudou .sender-tag { color: #e65100; }
.xiaocai .msg-bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
.xiaocai .msg-bubble .msg-time { color: rgba(255,255,255,0.5); }
.msg-unread { animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ========== 输入区 ========== */
#inputArea {
  flex-shrink: 0; background: #fff; border-top: 1px solid #eee;
  padding: 10px 14px; display: flex; gap: 8px; align-items: flex-end;
}
#inputArea .identity-badge {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
#inputArea textarea {
  flex: 1; border: none; outline: none; font-size: 15px; resize: none;
  min-height: 36px; max-height: 120px; line-height: 1.5; padding: 6px 0;
  font-family: inherit;
}
#inputArea #sendBtn {
  width: 70px; padding: 10px; background: #e94560; color: #fff; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; flex-shrink: 0;
}
#inputArea #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ========== 系统消息 ========== */
.sys-msg { text-align: center; color: #aaa; font-size: 12px; margin: 6px 0; }
</style>
</head>
<body>

<!-- ====== 设置页 ====== -->
<div id="setupOverlay">
  <div id="setupBox">
    <h2>🛡️ 麻阳百事通聊天室</h2>
    <p>输入 GitHub Token 选择身份进入</p>
    <input type="password" id="tokenInput" placeholder="GitHub Token (ghp_...)" autocomplete="off">
    <select id="myIdentity">
      <option value="huahua">🐔 华华（送水工）</option>
      <option value="doudou">🫘 豆豆（自动执行）</option>
      <option value="xiaocai">💰 小财神（AI管家）</option>
    </select>
    <p class="my-identity">🔑 Token 只存在你本地浏览器</p>
    <button onclick="enterChat()">🚪 进入聊天室</button>
  </div>
</div>

<!-- ====== 主界面 ====== -->
<div id="mainUI">
  <div id="header">
    <div>
      <h1>💬 麻阳百事通 · 三人组</h1>
      <div class="status"><span class="dot green" id="statusDot"></span><span id="statusText">已连接</span></div>
    </div>
    <div style="display:flex;gap:6px;">
      <span id="notifCount" style="background:#e94560;color:#fff;border-radius:10px;padding:2px 8px;font-size:12px;"></span>
      <button class="tool-btn" onclick="document.getElementById('setupOverlay').style.display='flex';document.getElementById('mainUI').style.display='none'">⚙️</button>
    </div>
  </div>
  <div id="msgContainer"></div>
  <div id="inputArea">
    <div class="identity-badge" id="myBadge">🐔</div>
    <textarea id="msgInput" placeholder="说点什么..." rows="1" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
// ========== 配置 ==========
const OWNER = 'popmyshu', REPO = 'water', BRANCH = 'main', FILE = 'chat_messages.json';
const POLL_MS = 3000; // 3秒轮询
const IDENTITY_MAP = { huahua: { emoji:'🐔', name:'华华' }, doudou: { emoji:'🫘', name:'豆豆' }, xiaocai: { emoji:'💰', name:'小财神' } };

let TOKEN = '', MY_ROLE = 'huahua', lastMsgId = 0, lastReadTime = 0, sending = false;
let pollTimer = null, unreadCount = 0;
let currentMessages = [];

// ========== 进入聊天室 ==========
function enterChat() {
  TOKEN = document.getElementById('tokenInput').value.trim();
  MY_ROLE = document.getElementById('myIdentity').value;
  if (!TOKEN) { alert('请输入 GitHub Token'); return; }
  if (!TOKEN.startsWith('ghp_') && !TOKEN.startsWith('github_pat_')) { alert('Token 格式不对，应该是 ghp_ 开头的'); return; }
  localStorage.setItem('gh_token_v2', TOKEN);
  localStorage.setItem('my_role', MY_ROLE);
  document.getElementById('setupOverlay').style.display = 'none';
  document.getElementById('mainUI').style.display = 'flex';
  updateBadge();
  startPolling();
  loadMessages();
}

function updateBadge() {
  const info = IDENTITY_MAP[MY_ROLE];
  document.getElementById('myBadge').textContent = info.emoji;
  document.getElementById('msgInput').placeholder = `${info.name}，说点什么...`;
}

// 恢复上次身份
(function() {
  const savedToken = localStorage.getItem('gh_token_v2');
  const savedRole = localStorage.getItem('my_role');
  if (savedToken) { document.getElementById('tokenInput').value = savedToken; }
  if (savedRole && IDENTITY_MAP[savedRole]) { document.getElementById('myIdentity').value = savedRole; }
  lastReadTime = parseInt(localStorage.getItem('lastReadTime') || '0');
})();

// ========== 轮询 ==========
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadMessages, POLL_MS);
}
function setStatus(ok) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (ok === true) { dot.className = 'dot green'; txt.textContent = '已连接'; }
  else if (ok === false) { dot.className = 'dot red'; txt.textContent = '连接失败'; }
  else { dot.className = 'dot yellow'; txt.textContent = '同步中...'; }
}

// ========== 加载消息 ==========
async function loadMessages() {
  try {
    const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) { setStatus(false); return; }
    const data = await resp.json();
    const raw = atob(data.content);
    // UTF-8 解码
    const decoded = decodeURIComponent(escape(raw));
    const messages = JSON.parse(decoded);
    setStatus(true);
    
    // 去重 & 排序
    const seen = new Set();
    const unique = [];
    for (const m of messages) {
      const key = `${m.sender}:${m.text}:${m.time}`;
      if (!seen.has(key)) { seen.add(key); unique.push(m); }
    }
    unique.sort((a,b) => new Date(a.time) - new Date(b.time));
    
    // 检查是否有新消息
    const latest = unique.length > 0 ? unique[unique.length-1] : null;
    if (latest && latest.id !== lastMsgId) {
      const oldLen = currentMessages.length;
      currentMessages = unique;
      renderMessages(unique, oldLen);
      if (latest.id > lastMsgId) {
        lastMsgId = latest.id;
        updateNotifCount(unique);
      }
    }
  } catch(e) {
    setStatus(false);
  }
}

// ========== 渲染 ==========
function renderMessages(messages, oldLen) {
  const container = document.getElementById('msgContainer');
  const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  
  // 检测新消息（从 oldLen 开始的新消息）
  const newMsgs = messages.slice(oldLen || 0);
  
  // 全量重绘
  container.innerHTML = '';
  let lastDate = '';
  for (let i = 0; i < messages.length; i++) {
    const m = messages[i];
    const msgDate = m.time ? m.time.substring(0,10) : '';
    if (msgDate && msgDate !== lastDate) {
      const div = document.createElement('div'); div.className = 'msg-date-divider';
      div.textContent = formatDate(msgDate);
      container.appendChild(div);
      lastDate = msgDate;
    }
    
    // 系统消息
    if (m.sender === 'system') {
      const div = document.createElement('div'); div.className = 'sys-msg';
      div.textContent = m.text;
      container.appendChild(div);
      continue;
    }
    
    const isNew = i >= (oldLen || 0);
    const isMine = m.sender === MY_ROLE;
    const info = IDENTITY_MAP[m.sender] || { emoji:'❓', name:m.sender };
    
    const row = document.createElement('div');
    row.className = `msg-row ${m.sender}`;
    if (isNew) row.classList.add('msg-unread');
    
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    bubble.innerHTML = `<div class="sender-tag">${info.emoji} ${info.name}</div><div>${escapeHtml(m.text)}</div><div class="msg-time">${formatTime(m.time)}</div>`;
    row.appendChild(bubble);
    container.appendChild(row);
  }
  
  // 如果没有消息
  if (messages.length === 0) {
    container.innerHTML = '<div class="sys-msg">👋 欢迎来到麻阳百事通聊天室！说句话吧</div>';
  }
  
  // 自动滚到底
  if (isAtBottom || oldLen === 0) {
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
  }
}

// ========== 发送消息 ==========
async function sendMsg() {
  if (sending) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  
  sending = true;
  document.getElementById('sendBtn').disabled = true;
  setStatus(null); // 同步中
  
  try {
    // 1. 读取最新文件获取 SHA
    const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) { alert('读取失败: ' + resp.status); sending = false; document.getElementById('sendBtn').disabled = false; return; }
    const data = await resp.json();
    const sha = data.sha;
    const decoded = decodeURIComponent(escape(atob(data.content)));
    let messages = JSON.parse(decoded);
    
    // 2. 添加新消息
    const now = new Date();
    const newMsg = {
      id: now.getTime(),
      sender: MY_ROLE,
      text: text,
      time: now.toISOString()
    };
    messages.push(newMsg);
    
    // 3. 写入
    const contentB64 = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));
    const payload = {
      message: `chat: ${MY_ROLE}`,
      content: contentB64,
      sha: sha,
      branch: BRANCH
    };
    
    const putResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });
    
    if (!putResp.ok) {
      const errData = await putResp.json();
      if (putResp.status === 409) {
        // SHA冲突，重试一次
        await new Promise(r => setTimeout(r, 500));
        const retryResp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}?ref=${BRANCH}`, {
          headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        const retryData = await retryResp.json();
        const retrySha = retryData.sha;
        const retryDecoded = decodeURIComponent(escape(atob(retryData.content)));
        let retryMsgs = JSON.parse(retryDecoded);
        retryMsgs.push(newMsg);
        const retryB64 = btoa(unescape(encodeURIComponent(JSON.stringify(retryMsgs, null, 2))));
        const retryPayload = {
          message: `chat: ${MY_ROLE} (retry)`,
          content: retryB64,
          sha: retrySha,
          branch: BRANCH
        };
        const retryPut = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${TOKEN}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(retryPayload)
        });
        if (!retryPut.ok) { alert('发送失败(重试): ' + await retryPut.text()); }
      } else {
        alert('发送失败: ' + await putResp.text());
      }
    }
    
    // 4. 清空输入，立即加载
    input.value = '';
    input.style.height = 'auto';
    lastReadTime = now.getTime();
    localStorage.setItem('lastReadTime', String(lastReadTime));
    await loadMessages();
    
  } catch(e) {
    alert('发送出错: ' + e.message);
  }
  
  sending = false;
  document.getElementById('sendBtn').disabled = false;
  setStatus(true);
}

// ========== 未读计数 & 桌面通知 ==========
function updateNotifCount(messages) {
  const myTime = parseInt(localStorage.getItem('lastReadTime') || '0');
  let unread = 0;
  let lastUnread = null;
  for (const m of messages) {
    const t = new Date(m.time).getTime();
    if (t > myTime && m.sender !== MY_ROLE && m.sender !== 'system') {
      unread++;
      lastUnread = m;
    }
  }
  unreadCount = unread;
  const el = document.getElementById('notifCount');
  if (unread > 0) { el.textContent = `🔔 ${unread}`; } else { el.textContent = ''; }
  
  // 桌面通知（只提醒最新一条）
  if (lastUnread && document.hidden && Notification.permission === 'granted') {
    const info = IDENTITY_MAP[lastUnread.sender] || { emoji:'❓', name:lastUnread.sender };
    new Notification(`💬 ${info.emoji} ${info.name}`, {
      body: lastUnread.text.length > 50 ? lastUnread.text.substring(0,50)+'...' : lastUnread.text,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>'
    });
  }
}

// 点击消息区域或发送时标记已读
document.addEventListener('click', function() {
  if (unreadCount > 0) {
    lastReadTime = Date.now();
    localStorage.setItem('lastReadTime', String(lastReadTime));
    document.getElementById('notifCount').textContent = '';
    unreadCount = 0;
  }
});

// ========== 工具函数 ==========
function formatDate(d) {
  const today = new Date(); const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  const ds = d.substring(0,10);
  if (ds === today.toISOString().substring(0,10)) return '今天';
  if (ds === yesterday.toISOString().substring(0,10)) return '昨天';
  return d.substring(5);
}
function formatTime(t) {
  if (!t) return '';
  const d = new Date(t);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

// 回车发送
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// 请求通知权限
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
</body>
</html>
