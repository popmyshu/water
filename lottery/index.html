<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小财神双色球 · 选号·开奖·计算 一条龙</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f5f0eb;min-height:100vh}
header{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.2)}
header h1{font-size:20px;font-weight:700;letter-spacing:1px}
header p{font-size:11px;opacity:.85;margin-top:2px}

.tabs{display:flex;background:#fff;border-bottom:2px solid #e74c3c;position:sticky;top:59px;z-index:49;overflow-x:auto}
.tab{flex:1;text-align:center;padding:10px 6px;font-size:13px;font-weight:600;cursor:pointer;color:#555;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap}
.tab.active{color:#c0392b;border-bottom-color:#c0392b;background:#fff5f5}
.tab:hover{background:#fff5f5}

.content{max-width:480px;margin:0 auto;padding:12px 14px 80px}
.panel{display:none}.panel.active{display:block}

.ball{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;font-size:14px;font-weight:700;color:#fff;margin:2px}
.ball-red{background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b)}
.ball-blue{background:radial-gradient(circle at 35% 35%,#6bb3ff,#1a5276)}

.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}

.btn{display:inline-block;padding:8px 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;text-align:center}
.btn:active{transform:scale(.96)}
.btn-red{background:#e74c3c;color:#fff}
.btn-red:hover{background:#c0392b}
.btn-blue{background:#2980b9;color:#fff}
.btn-blue:hover{background:#1a5276}
.btn-green{background:#27ae60;color:#fff}
.btn-green:hover{background:#1e8449}
.btn-gray{background:#95a5a6;color:#fff}
.btn-gray:hover{background:#7f8c8d}
.btn-outline{background:transparent;border:2px solid #e74c3c;color:#e74c3c}
.btn-outline:hover{background:#e74c3c;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}

.grid-num{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:8px 0}
.num-btn{width:36px;height:36px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;display:flex;align-items:center;justify-content:center}
.num-btn:hover{border-color:#e74c3c;color:#e74c3c}
.num-btn.selected-red{border-color:#c0392b;background:#c0392b;color:#fff}
.num-btn.selected-blue{border-color:#1a5276;background:#1a5276;color:#fff}

.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.detail-row:last-child{border:none}
.label{color:#666}
.value{font-weight:600;color:#333}

.history-item{padding:10px;border-bottom:1px solid #f0f0f0}
.history-item:last-child{border:none}
.history-item .issue{font-size:12px;color:#999}
.history-item .date{font-size:11px;color:#aaa}

canvas{width:100%!important;height:auto!important;max-height:250px;background:#fff;border-radius:8px}

.prize-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff}
.prize-1{background:linear-gradient(135deg,#f39c12,#e67e22)}
.prize-2{background:linear-gradient(135deg,#95a5a6,#7f8c8d)}
.prize-3{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.prize-4{background:linear-gradient(135deg,#3498db,#2980b9)}
.prize-5{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.prize-6{background:linear-gradient(135deg,#1abc9c,#16a085)}

.notice{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px;font-size:12px;color:#e65100;margin:8px 0}

input[type=number],input[type=text],select{width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:.2s}
input:focus,select:focus{border-color:#e74c3c}

.loading{text-align:center;padding:20px;color:#999;font-size:14px}
.loading::after{content:'...';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%{content:'...'}80%{content:''}}

.saved-numbers{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.saved-num-card{padding:6px 10px;border-radius:8px;background:#f9f9f9;border:1px solid #eee;font-size:12px;cursor:pointer;white-space:nowrap}
.saved-num-card:hover{border-color:#e74c3c}

@media(max-width:380px){.ball{width:30px;height:30px;font-size:12px}.num-btn{width:32px;height:32px;font-size:12px}}
</style>
</head>
<body>

<header>
  <h1>🎰 小财神双色球</h1>
  <p>智能选号 · 开奖走势 · 中奖计算 · 一套搞定</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('picker')">🎯 选号</div>
  <div class="tab" onclick="switchTab('draw')">📊 开奖</div>
  <div class="tab" onclick="switchTab('calc')">🧮 计算</div>
</div>

<div class="content">

<!-- ==================== 面板1: 选号机 ==================== -->
<div id="panel-picker" class="panel active">
  <div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <button class="btn btn-red btn-sm" onclick="autoPick()">🎲 机选1注</button>
      <button class="btn btn-red btn-sm" onclick="autoPick(5)">🎲 机选5注</button>
      <button class="btn btn-red btn-sm" onclick="autoPick(10)">🎲 机选10注</button>
      <button class="btn btn-outline btn-sm" onclick="clearPicks()">🗑️ 清空</button>
    </div>
    <div id="pick-results"></div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">🎯 手动选号</div>
    <div style="font-size:12px;color:#666;margin-bottom:4px">红球（选6个，1-33）</div>
    <div class="grid-num" id="red-grid"></div>
    <div style="font-size:12px;color:#666;margin-bottom:4px">蓝球（选1个，1-16）</div>
    <div class="grid-num" id="blue-grid"></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-red btn-sm" onclick="addManualPick()">➕ 加入列表</button>
      <button class="btn btn-blue btn-sm" onclick="savePick()">💾 守号保存</button>
    </div>
    <div id="manual-status" style="font-size:12px;color:#666;margin-top:6px"></div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 我的守号</div>
    <div id="saved-picks"></div>
    <div style="text-align:center;margin-top:6px;display:none" id="no-saved">暂无守号，机选后点"守号保存"</div>
  </div>
</div>

<!-- ==================== 面板2: 开奖+走势 ==================== -->
<div id="panel-draw" class="panel">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:15px;font-weight:600">📡 最新开奖</span>
      <button class="btn btn-red btn-sm" onclick="fetchDrawData()">🔄 刷新</button>
    </div>
    <div id="latest-draw">加载中<span class="loading"></span></div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">📈 红球走势（近30期）</div>
    <canvas id="red-chart"></canvas>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">📈 蓝球走势（近30期）</div>
    <canvas id="blue-chart"></canvas>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">🔥 冷热号统计（近50期）</div>
    <div id="hot-cold-stats" style="font-size:13px"></div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">📋 历史开奖记录</div>
    <div id="history-list"></div>
    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-gray btn-sm" onclick="loadMoreHistory()">加载更多</button>
    </div>
  </div>
</div>

<!-- ==================== 面板3: 中奖计算器 ==================== -->
<div id="panel-calc" class="panel">
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">🎯 我的号码</div>
    <div style="font-size:12px;color:#666;margin-bottom:4px">红球（6个，空格或逗号分隔，如：3 12 18 25 30 33）</div>
    <input type="text" id="calc-my-red" placeholder="例：3 12 18 25 30 33" style="margin-bottom:6px">
    <div style="font-size:12px;color:#666;margin-bottom:4px">蓝球（1个）</div>
    <input type="number" id="calc-my-blue" placeholder="1-16" min="1" max="16" style="margin-bottom:4px">
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">🏆 开奖号码</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <button class="btn btn-green btn-sm" onclick="useLatestForCalc()">📥 填入最新开奖</button>
    </div>
    <div style="font-size:12px;color:#666;margin-bottom:4px">红球（6个，空格分隔）</div>
    <input type="text" id="calc-draw-red" placeholder="例：3 12 18 25 30 33" style="margin-bottom:6px">
    <div style="font-size:12px;color:#666;margin-bottom:4px">蓝球（1个）</div>
    <input type="number" id="calc-draw-blue" placeholder="1-16" min="1" max="16" style="margin-bottom:4px">
    <div style="margin-top:8px">
      <button class="btn btn-red" onclick="calcPrize()" style="width:100%">🧮 计算奖金</button>
    </div>
  </div>

  <div class="card" id="calc-result" style="display:none"></div>
</div>

</div>

<script>
// ========== 全局数据 ==========
let drawData = [];         // 历史开奖数据
let currentPage = 1;
let myPicks = [];          // 当前选号列表
const PROXY = 'https://api.allorigins.win/raw?url=';
const API_URL = 'https://www.cwl.gov.cn/cwl_admin/front/cwlkj/search/kjxx/findDrawNotice?name=ssq&pageSize=50&pageNo=';

// 内置默认数据（当API不可用时的备用）
const FALLBACK_DATA = [
  {"code":"2026047","date":"2026-04-26","red":[2,9,15,22,28,31],"blue":7},
  {"code":"2026046","date":"2026-04-23","red":[5,11,18,24,27,33],"blue":3},
  {"code":"2026045","date":"2026-04-21","red":[1,8,14,19,26,30],"blue":12},
  {"code":"2026044","date":"2026-04-19","red":[3,7,13,21,25,29],"blue":5},
  {"code":"2026043","date":"2026-04-16","red":[6,10,17,20,23,32],"blue":9},
  {"code":"2026042","date":"2026-04-14","red":[4,12,16,22,27,31],"blue":2},
  {"code":"2026041","date":"2026-04-12","red":[8,13,19,24,28,30],"blue":11},
  {"code":"2026040","date":"2026-04-09","red":[2,7,15,20,26,33],"blue":4},
  {"code":"2026039","date":"2026-04-07","red":[1,11,18,23,29,32],"blue":8},
  {"code":"2026038","date":"2026-04-05","red":[5,9,14,21,25,27],"blue":6},
  {"code":"2026037","date":"2026-04-02","red":[3,10,16,22,28,31],"blue":10},
  {"code":"2026036","date":"2026-03-31","red":[7,12,19,24,27,30],"blue":1},
  {"code":"2026035","date":"2026-03-29","red":[2,8,15,20,26,33],"blue":13},
  {"code":"2026034","date":"2026-03-26","red":[4,11,17,23,28,32],"blue":5},
  {"code":"2026033","date":"2026-03-24","red":[6,13,18,22,25,29],"blue":7},
  {"code":"2026032","date":"2026-03-22","red":[1,9,14,21,27,30],"blue":3},
  {"code":"2026031","date":"2026-03-19","red":[5,10,16,19,24,31],"blue":12},
  {"code":"2026030","date":"2026-03-17","red":[3,7,12,20,26,28],"blue":8},
  {"code":"2026029","date":"2026-03-15","red":[8,14,19,23,27,33],"blue":2},
  {"code":"2026028","date":"2026-03-12","red":[2,11,15,22,25,30],"blue":9}
];

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function(){
  initRedGrid();
  initBlueGrid();
  loadSavedPicks();
  fetchDrawData();
});

// ========== Tab切换 ==========
function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  if(name==='draw') drawCharts();
}

// ========== 号码网格 ==========
function initRedGrid(){
  const g=document.getElementById('red-grid'); g.innerHTML='';
  for(let i=1;i<=33;i++){
    const btn=document.createElement('div');
    btn.className='num-btn'; btn.textContent=i;
    btn.dataset.num=i; btn.dataset.type='red';
    btn.onclick=function(){toggleRed(this)};
    g.appendChild(btn);
  }
}
function initBlueGrid(){
  const g=document.getElementById('blue-grid'); g.innerHTML='';
  for(let i=1;i<=16;i++){
    const btn=document.createElement('div');
    btn.className='num-btn'; btn.textContent=i;
    btn.dataset.num=i; btn.dataset.type='blue';
    btn.onclick=function(){toggleBlue(this)};
    g.appendChild(btn);
  }
}
function toggleRed(el){
  const selected=document.querySelectorAll('#red-grid .selected-red');
  if(el.classList.contains('selected-red')){el.classList.remove('selected-red');return}
  if(selected.length>=6){document.getElementById('manual-status').textContent='⚠️ 红球最多选6个！';return}
  el.classList.add('selected-red');
  document.getElementById('manual-status').textContent='';
}
function toggleBlue(el){
  document.querySelectorAll('#blue-grid .selected-blue').forEach(b=>b.classList.remove('selected-blue'));
  el.classList.add('selected-blue');
  document.getElementById('manual-status').textContent='';
}

// ========== 机选 ==========
function autoPick(count=1){
  myPicks=[];
  for(let i=0;i<count;i++){
    const reds=getRandomReds(6);
    const blue=Math.floor(Math.random()*16)+1;
    myPicks.push({red:reds,blue:blue});
  }
  renderPicks();
}

function getRandomReds(n){
  const pool=[];
  for(let i=1;i<=33;i++)pool.push(i);
  const result=[];
  for(let i=0;i<n;i++){
    const idx=Math.floor(Math.random()*pool.length);
    result.push(pool[idx]); pool.splice(idx,1);
  }
  return result.sort((a,b)=>a-b);
}

function clearPicks(){myPicks=[];renderPicks()}

function renderPicks(){
  const c=document.getElementById('pick-results');
  if(myPicks.length===0){c.innerHTML='<div style="text-align:center;color:#999;padding:10px;font-size:13px">点击"机选"开始选号</div>';return}
  c.innerHTML='';
  myPicks.forEach((p,i)=>{
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f0f0f0';
    div.innerHTML=`<span style="font-size:11px;color:#999;min-width:28px">#${i+1}</span>`;
    p.red.forEach(r=>{
      const b=document.createElement('span');b.className='ball ball-red';b.textContent=r;div.appendChild(b)
    });
    const bb=document.createElement('span');bb.className='ball ball-blue';bb.textContent=p.blue;div.appendChild(bb);
    const del=document.createElement('span');
    del.textContent='✕';del.style.cssText='margin-left:auto;cursor:pointer;color:#ccc;font-size:16px;padding:2px 6px';
    del.onclick=function(){myPicks.splice(i,1);renderPicks()};
    div.appendChild(del);
    c.appendChild(div);
  });
}

// ========== 手动选号加入列表 ==========
function addManualPick(){
  const reds=[...document.querySelectorAll('#red-grid .selected-red')].map(b=>parseInt(b.dataset.num)).sort((a,b)=>a-b);
  const blues=[...document.querySelectorAll('#blue-grid .selected-blue')].map(b=>parseInt(b.dataset.num));
  if(reds.length!==6){document.getElementById('manual-status').textContent='⚠️ 请选6个红球！';return}
  if(blues.length!==1){document.getElementById('manual-status').textContent='⚠️ 请选1个蓝球！';return}
  myPicks.push({red:reds,blue:blues[0]});
  renderPicks();
  document.getElementById('manual-status').textContent='✅ 已加入列表！';
  // 清除选中状态
  document.querySelectorAll('#red-grid .selected-red').forEach(b=>b.classList.remove('selected-red'));
  document.querySelectorAll('#blue-grid .selected-blue').forEach(b=>b.classList.remove('selected-blue'));
}

// ========== 守号管理 ==========
function savePick(){
  const reds=[...document.querySelectorAll('#red-grid .selected-red')].map(b=>parseInt(b.dataset.num)).sort((a,b)=>a-b);
  const blues=[...document.querySelectorAll('#blue-grid .selected-blue')].map(b=>parseInt(b.dataset.num));
  if(reds.length!==6||blues.length!==1){
    // 如果没有手动选，保存当前列表第一注
    if(myPicks.length>0){
      const p=myPicks[0];
      let saved=JSON.parse(localStorage.getItem('lottery_saved')||'[]');
      saved.push({red:p.red,blue:p.blue,time:new Date().toLocaleString()});
      localStorage.setItem('lottery_saved',JSON.stringify(saved));
      loadSavedPicks();
      showToast('✅ 已保存守号！');
      return;
    }
    document.getElementById('manual-status').textContent='⚠️ 请先选号！';
    return;
  }
  let saved=JSON.parse(localStorage.getItem('lottery_saved')||'[]');
  saved.push({red:reds,blue:blues[0],time:new Date().toLocaleString()});
  localStorage.setItem('lottery_saved',JSON.stringify(saved));
  loadSavedPicks();
  showToast('✅ 守号已保存！');
}

function loadSavedPicks(){
  const saved=JSON.parse(localStorage.getItem('lottery_saved')||'[]');
  const c=document.getElementById('saved-picks');
  const no=document.getElementById('no-saved');
  if(saved.length===0){c.innerHTML='';no.style.display='block';return}
  no.style.display='none';
  c.innerHTML='<div class="saved-numbers"></div>';
  const wrap=c.querySelector('.saved-numbers');
  saved.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='saved-num-card';
    card.innerHTML=`<span style="color:#c0392b;font-weight:700">${p.red.join(' ')}</span> + <span style="color:#1a5276;font-weight:700">${p.blue}</span>`;
    card.title='点击选号'+(p.time?' | 保存于 '+p.time:'');
    card.onclick=function(){
      // 填入手动选号网格
      document.querySelectorAll('#red-grid .num-btn').forEach(b=>{
        if(p.red.includes(parseInt(b.dataset.num))) b.classList.add('selected-red');
        else b.classList.remove('selected-red');
      });
      document.querySelectorAll('#blue-grid .num-btn').forEach(b=>{
        if(parseInt(b.dataset.num)===p.blue) b.classList.add('selected-blue');
        else b.classList.remove('selected-blue');
      });
      showToast('📋 已填入守号，可点击"加入列表"');
    };
    // 删除按钮
    const del=document.createElement('span');
    del.textContent=' ✕';del.style.cssText='color:#ccc;cursor:pointer;margin-left:4px;font-size:14px';
    del.onclick=function(e){
      e.stopPropagation();
      saved.splice(i,1);
      localStorage.setItem('lottery_saved',JSON.stringify(saved));
      loadSavedPicks();
    };
    card.appendChild(del);
    wrap.appendChild(card);
  });
}

// ========== Toast提示 ==========
let toastTimer;
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;max-width:80%;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.style.opacity='0',2000);
}

// ========== 开奖数据获取 ==========
async function fetchDrawData(){
  const el=document.getElementById('latest-draw');
  el.innerHTML='正在获取最新开奖数据<span class="loading"></span>';
  drawData=[];

  // 策略1：用CORS代理
  try{
    const resp=await fetch(PROXY+encodeURIComponent(API_URL+'1&issueStart=&issueEnd='));
    if(resp.ok){
      const text=await resp.text();
      let data;
      try{data=JSON.parse(text);
        // CWL API返回格式：{total: N, data: [...], ...}
        if(data.data&&data.data.length>0){parseCwlData(data.data);el.innerHTML='';renderLatestDraw();renderHistory();drawCharts();return}
      }catch(e){}
    }
  }catch(e){}

  // 策略2：直接请求
  try{
    const resp=await fetch(API_URL+'1&issueStart=&issueEnd=', {mode:'cors'});
    if(resp.ok){
      const text=await resp.text();
      let data;
      try{data=JSON.parse(text);
        if(data.data&&data.data.length>0){parseCwlData(data.data);el.innerHTML='';renderLatestDraw();renderHistory();drawCharts();return}
      }catch(e){}
    }
  }catch(e){}

  // 策略3：用备用数据
  console.warn('API不可用，使用内置备用数据');
  drawData=FALLBACK_DATA;
  el.innerHTML='<div class="notice">⚠️ 网络开奖数据获取失败，显示内置参考数据（非实时）</div>';
  renderLatestDraw();
  renderHistory();
  drawCharts();
}

function parseCwlData(arr){
  drawData=[];
  arr.forEach(item=>{
    try{
      const red=item.red?item.red.split(',').map(Number):[];
      const blue=item.blue?parseInt(item.blue):0;
      if(red.length===6&&blue>0){
        drawData.push({
          code:item.code||'',
          date:item.date||'',
          red:red.sort((a,b)=>a-b),
          blue:blue
        });
      }
    }catch(e){}
  });
}

// ========== 走势图 ==========
function drawCharts(){
  if(drawData.length<2) return;
  const recent=drawData.slice(0,30).reverse();
  drawLineChart('red-chart', recent, 'red', '#e74c3c');
  drawLineChart('blue-chart', recent, 'blue', '#2980b9');
  renderHotCold();
}

function drawLineChart(canvasId, data, type, color){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth||340;
  const h=220;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);

  // 解析数据
  const values=type==='red'
    ? data.map(d=>({v:d.red.reduce((a,b)=>a+b,0)/6,label:d.code.slice(-3)+'期'}))
    : data.map(d=>({v:d.blue,label:d.code.slice(-3)+'期'}));

  const pad={top:20,bottom:30,left:30,right:10};
  const cw=w-pad.left-pad.right;
  const ch=h-pad.top-pad.bottom;

  const minV=Math.max(0,Math.min(...values.map(v=>v.v))-2);
  const maxV=Math.min(type==='red'?33:16,Math.max(...values.map(v=>v.v))+2);
  const range=maxV-minV||1;

  // 清空
  ctx.clearRect(0,0,w,h);

  // 网格线
  ctx.strokeStyle='#f0f0f0'; ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=pad.top+ch*i/4;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();
    ctx.fillStyle='#bbb';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(maxV-i*range/4),pad.left-4,y+3);
  }

  if(values.length<2){
    ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('数据不足',w/2,h/2);
    return;
  }

  const step=cw/(values.length-1);
  // 画线
  ctx.beginPath();
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round';
  values.forEach((v,i)=>{
    const x=pad.left+i*step;
    const y=pad.top+ch-(v.v-minV)/range*ch;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // 画点
  values.forEach((v,i)=>{
    const x=pad.left+i*step;
    const y=pad.top+ch-(v.v-minV)/range*ch;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
  });

  // X轴标签（隔几个显示）
  const labelStep=Math.max(1,Math.floor(values.length/8));
  ctx.fillStyle='#999';ctx.font='9px sans-serif';ctx.textAlign='center';
  values.forEach((v,i)=>{
    if(i%labelStep===0||i===values.length-1){
      ctx.fillText(v.label,pad.left+i*step,h-5);
    }
  });
}

// ========== 冷热号统计 ==========
function renderHotCold(){
  const el=document.getElementById('hot-cold-stats');
  if(drawData.length<3){el.innerHTML='数据不足，继续累积中...';return}

  const redCount={}, blueCount={};
  for(let i=1;i<=33;i++) redCount[i]=0;
  for(let i=1;i<=16;i++) blueCount[i]=0;

  drawData.forEach(d=>{
    d.red.forEach(r=>{redCount[r]=(redCount[r]||0)+1});
    blueCount[d.blue]=(blueCount[d.blue]||0)+1;
  });

  const total=drawData.length;
  const avgRed=total*6/33;
  const avgBlue=total/16;

  const redSorted=Object.entries(redCount).sort((a,b)=>b[1]-a[1]);
  const blueSorted=Object.entries(blueCount).sort((a,b)=>b[1]-a[1]);

  el.innerHTML=`
    <div style="margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:#c0392b;margin-bottom:4px">🔴 红球冷热</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${redSorted.map(([num,count])=>{
          const diff=count-avgRed;
          let cls='#95a5a6';
          if(diff>1) cls='#e74c3c';
          else if(diff>0) cls='#e67e22';
          else if(diff<-1) cls='#3498db';
          else if(diff<0) cls='#85c1e9';
          return `<span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:${cls}22;color:${cls};font-weight:600">${num}<span style="font-weight:400;opacity:.7">(${count})</span></span>`;
        }).join('')}
      </div>
      <div style="font-size:10px;color:#999;margin-top:4px">🔴热 ⚪温 🔵冷（近${total}期出现次数）</div>
    </div>
    <div>
      <div style="font-size:13px;font-weight:600;color:#1a5276;margin-bottom:4px">🔵 蓝球冷热</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${blueSorted.map(([num,count])=>{
          const diff=count-avgBlue;
          let cls='#95a5a6';
          if(diff>1) cls='#e74c3c';
          else if(diff>0) cls='#e67e22';
          else if(diff<-1) cls='#3498db';
          else if(diff<0) cls='#85c1e9';
          return `<span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;background:${cls}22;color:${cls};font-weight:600">${num}<span style="font-weight:400;opacity:.7">(${count})</span></span>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ========== 中奖计算器 ==========
function useLatestForCalc(){
  if(drawData.length===0){showToast('⚠️ 暂无开奖数据，请先刷新');return}
  const d=drawData[0];
  document.getElementById('calc-draw-red').value=d.red.join(' ');
  document.getElementById('calc-draw-blue').value=d.blue;
  showToast('✅ 已填入最新开奖号码');
}

function calcPrize(){
  const myRedStr=document.getElementById('calc-my-red').value.trim();
  const myBlue=parseInt(document.getElementById('calc-my-blue').value);
  const drawRedStr=document.getElementById('calc-draw-red').value.trim();
  const drawBlue=parseInt(document.getElementById('calc-draw-blue').value);

  const myRed=myRedStr.split(/[\s,，]+/).map(Number).filter(n=>!isNaN(n)&&n>=1&&n<=33);
  const drawRed=drawRedStr.split(/[\s,，]+/).map(Number).filter(n=>!isNaN(n)&&n>=1&&n<=33);

  if(myRed.length!==6||isNaN(myBlue)||myBlue<1||myBlue>16){
    showToast('⚠️ 请正确填写你的号码（6红+1蓝）');
    return;
  }
  if(drawRed.length!==6||isNaN(drawBlue)||drawBlue<1||drawBlue>16){
    showToast('⚠️ 请正确填写开奖号码（6红+1蓝）');
    return;
  }

  // 计算匹配
  const redMatch=myRed.filter(n=>drawRed.includes(n)).length;
  const blueMatch=myBlue===drawBlue?1:0;

  // 判断奖项
  let prize={level:0,name:'未中奖',amount:0,badge:''};
  if(redMatch===6&&blueMatch===1) prize={level:1,name:'🥇 一等奖',amount:'浮动（通常500万-1000万）',badge:'prize-1'};
  else if(redMatch===6&&blueMatch===0) prize={level:2,name:'🥈 二等奖',amount:'浮动（通常10万-50万）',badge:'prize-2'};
  else if(redMatch===5&&blueMatch===1) prize={level:3,name:'🥉 三等奖',amount:'3,000元',badge:'prize-3'};
  else if((redMatch===5&&blueMatch===0)||(redMatch===4&&blueMatch===1)) prize={level:4,name:'🎯 四等奖',amount:'200元',badge:'prize-4'};
  else if((redMatch===4&&blueMatch===0)||(redMatch===3&&blueMatch===1)) prize={level:5,name:'🎯 五等奖',amount:'10元',badge:'prize-5'};
  else if((redMatch===2&&blueMatch===1)||(redMatch===1&&blueMatch===1)||(redMatch===0&&blueMatch===1)) prize={level:6,name:'🎯 六等奖',amount:'5元',badge:'prize-6'};
  else prize={level:0,name:'❌ 未中奖',amount:'0元',badge:''};

  const el=document.getElementById('calc-result');
  el.style.display='block';
  el.innerHTML=`
    <div style="text-align:center;padding:10px 0">
      <div style="margin-bottom:10px">
        <div style="font-size:12px;color:#999;margin-bottom:4px">我的号码</div>
        <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:2px">
          ${myRed.map(r=>{
            const matched=drawRed.includes(r);
            return `<span class="ball ball-red" style="${matched?'box-shadow:0 0 0 3px #f1c40f':''}">${r}</span>`
          }).join('')}
          <span class="ball ball-blue" style="${blueMatch?'box-shadow:0 0 0 3px #f1c40f':''}">${myBlue}</span>
        </div>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:12px;color:#999;margin-bottom:4px">开奖号码</div>
        <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:2px">
          ${drawRed.map(r=>`<span class="ball ball-red">${r}</span>`).join('')}
          <span class="ball ball-blue">${drawBlue}</span>
        </div>
      </div>
      <div style="border-top:1px solid #f0f0f0;padding-top:12px">
        <div style="font-size:13px;color:#666;margin-bottom:4px">匹配结果：红球 ${redMatch}/6 · 蓝球 ${blueMatch?'✅ 中':'❌ 未中'}</div>
        ${prize.level>0
          ? `<div><span class="prize-badge ${prize.badge}" style="font-size:16px;padding:6px 20px">${prize.name}</span></div>
             <div style="font-size:22px;font-weight:700;color:#c0392b;margin-top:8px">${prize.amount}</div>`
          : `<div style="font-size:18px;font-weight:700;color:#999">${prize.name}</div>`
        }
      </div>
    </div>
  `;
}

// ========== 窗口自适应 ==========
window.addEventListener('resize',()=>{
  if(document.getElementById('panel-draw').classList.contains('active')) drawCharts();
});
