<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小财神 · 看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d1117;color:#e6edf3;padding:16px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header h1{font-size:20px;color:#58a6ff;display:flex;align-items:center;gap:8px}
.header .badge{background:#21262d;color:#8b949e;padding:2px 10px;border-radius:10px;font-size:12px;border:1px solid #30363d}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-box{background:#161b22;border-radius:8px;padding:12px;text-align:center;border:1px solid #30363d}
.stat-num{font-size:24px;font-weight:700;color:#58a6ff}
.stat-label{font-size:12px;color:#8b949e;margin-top:2px}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.col{background:#161b22;border-radius:10px;padding:12px;min-height:200px;border:1px solid #30363d}
.col-title{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;color:#e6edf3}
.col-title .count{background:#21262d;color:#8b949e;border-radius:8px;padding:0 8px;font-size:11px}
.col-ready .col-title{border-bottom-color:#1f6feb}
.col-running .col-title{border-bottom-color:#d29922}
.col-done .col-title{border-bottom-color:#3fb950}
.card{background:#21262d;border-radius:6px;padding:10px;margin-bottom:8px;border:1px solid #30363d;border-left:3px solid#58a6ff;transition:all .1s}
.card:hover{border-color:#58a6ff}
.card.pri-high{border-left-color:#f85149}
.card.pri-med{border-left-color:#d29922}
.card.pri-low{border-left-color:#8b949e}
.card-title{font-size:13px;font-weight:500;margin-bottom:4px;color:#e6edf3}
.card-id{font-size:10px;color:#484f58;font-family:monospace}
.card-body{font-size:11px;color:#8b949e;margin:4px 0}
.card-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#484f58}
.card-footer .assignee{color:#58a6ff}
.card-footer .time{color:#484f58}
.status-tag{font-size:10px;padding:1px 5px;border-radius:3px}
.s-ready{background:#0d419d;color:#58a6ff}
.s-running{background:#3d2e00;color:#d29922}
.s-done{background:#003d1a;color:#3fb950}
.s-blocked{background:#3d0000;color:#f85149}
.empty-state{text-align:center;color:#484f58;padding:20px 0;font-size:12px}
.footer{margin-top:16px;display:flex;gap:12px}
.info-card{background:#161b22;border-radius:8px;padding:10px;border:1px solid #30363d;flex:1}
.info-title{font-size:11px;color:#8b949e;margin-bottom:4px}
.info-text{font-size:13px;color:#e6edf3}
.info-text .label{color:#8b949e;font-size:12px}
@media(max-width:600px){
  .board{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="header">
  <h1>📋 小财神 · 看板</h1>
  <span class="badge" id="update-time">读取中...</span>
</div>

<div class="stats" id="stats">
  <div class="stat-box"><div class="stat-num">-</div><div class="stat-label">待办</div></div>
  <div class="stat-box"><div class="stat-num">-</div><div class="stat-label">进行中</div></div>
  <div class="stat-box"><div class="stat-num">-</div><div class="stat-label">已完成</div></div>
  <div class="stat-box"><div class="stat-num">-</div><div class="stat-label">总任务</div></div>
</div>

<div class="board">
  <div class="col col-ready">
    <div class="col-title">📋 待办 <span class="count">0</span></div>
    <div id="col-ready"><div class="empty-state">暂无任务</div></div>
  </div>
  <div class="col col-running">
    <div class="col-title">🔄 进行中 <span class="count">0</span></div>
    <div id="col-running"><div class="empty-state">暂无任务</div></div>
  </div>
  <div class="col col-done">
    <div class="col-title">✅ 已完成 <span class="count">0</span></div>
    <div id="col-done"><div class="empty-state">暂无任务</div></div>
  </div>
</div>

<div class="footer">
  <div class="info-card">
    <div class="info-title">🤖 小财神状态</div>
    <div class="info-text">
      <span id="agent-status">连接中...</span><br>
      <span class="label">模型: DeepSeek Chat</span>
    </div>
  </div>
  <div class="info-card">
    <div class="info-title">📢 今日科普</div>
    <div class="info-text"><span class="label" id="today-science">加载中...</span></div>
  </div>
</div>

<script>
const STATUS_MAP = {ready:'待办',running:'进行中',done:'已完成',blocked:'阻塞',todo:'待办',triage:'待分类'};
const PRI_CLASS = {1:'pri-high',2:'pri-med',3:'pri-low',0:'pri-low'};

function fmtTime(ts) {
  if(!ts) return '';
  const d = new Date(ts * 1000);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if(diff < 60) return '刚刚';
  if(diff < 3600) return Math.floor(diff/60)+'分钟前';
  if(diff < 86400) return Math.floor(diff/3600)+'小时前';
  return d.toLocaleDateString('zh-CN');
}

async function load() {
  try {
    const resp = await fetch('kanban_data.json?'+Date.now());
    if(resp.ok) {
      const data = await resp.json();
      render(data);
      return;
    }
  } catch(e) {}
  // fallback: 在线版读取静态数据
  loadStatic();
}

function render(data) {
  const tasks = data.tasks || [];
  const stats = data.stats || {};
  const science = data.science_today || '暂无';
  
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-CN');
  
  // 统计数据
  const counts = {};
  for(const t of tasks) {
    const s = t.status || 'ready';
    counts[s] = (counts[s]||0) + 1;
  }
  document.querySelectorAll('.stat-box')[0].querySelector('.stat-num').textContent = (counts.ready||0)+(counts.todo||0)+(counts.triage||0);
  document.querySelectorAll('.stat-box')[1].querySelector('.stat-num').textContent = counts.running||0;
  document.querySelectorAll('.stat-box')[2].querySelector('.stat-num').textContent = counts.done||0;
  document.querySelectorAll('.stat-box')[3].querySelector('.stat-num').textContent = tasks.length;
  
  // 按状态分组
  const cols = {ready:[],todo:[],triage:[],running:[],done:[],blocked:[]};
  for(const t of tasks) {
    const s = t.status || 'ready';
    if(cols[s]) cols[s].push(t);
  }
  
  ['ready','running','done'].forEach(colKey => {
    // 合并ready+todo+triage
    let items = [];
    if(colKey === 'ready') {
      items = [...(cols.triage||[]), ...(cols.todo||[]), ...(cols.ready||[])];
    } else {
      items = cols[colKey] || [];
    }
    
    const container = document.getElementById('col-'+colKey);
    const countEl = container.parentElement.querySelector('.count');
    
    if(!items.length) {
      container.innerHTML = '<div class="empty-state">暂无任务</div>';
      countEl.textContent = '0';
      return;
    }
    
    countEl.textContent = items.length;
    container.innerHTML = items.map(t => {
      const pri = t.priority || 0;
      const statusLabel = STATUS_MAP[t.status] || t.status;
      const assignee = t.assignee || '-';
      const cls = PRI_CLASS[pri] || 'pri-low';
      return `<div class="card ${cls}">
        <div class="card-title">${t.title||'无标题'}</div>
        <div class="card-id">${t.id} · <span class="status-tag s-${t.status||'ready'}">${statusLabel}</span></div>
        ${t.body ? `<div class="card-body">${t.body}</div>` : ''}
        <div class="card-footer">
          <span>${assignee === 'hermes' ? '🤖 小财神' : assignee === 'user' ? '👤 华华' : '👤 '+assignee}</span>
          <span class="time">${fmtTime(t.created_at)}</span>
        </div>
      </div>`;
    }).join('');
  });
  
  document.getElementById('today-science').textContent = science;
  document.getElementById('agent-status').textContent = '✅ 运行中';
}

function loadStatic() {
  document.getElementById('update-time').textContent = '离线模式';
  document.querySelectorAll('.stat-box')[0].querySelector('.stat-num').textContent = '4';
  document.querySelectorAll('.stat-box')[1].querySelector('.stat-num').textContent = '0';
  document.querySelectorAll('.stat-box')[2].querySelector('.stat-num').textContent = '0';
  document.querySelectorAll('.stat-box')[3].querySelector('.stat-num').textContent = '4';
  
  document.getElementById('col-ready').innerHTML = [
    {id:'t_001',title:'今日科普 - 矿泉水vs纯净水对比',body:'D1科普内容已生成，转发朋友圈',priority:1,status:'ready',assignee:'hermes',created_at:Math.floor(Date.now()/1000)-300},
    {id:'t_002',title:'🚚 送水 - 城南明珠小区5户',body:'',priority:1,status:'ready',assignee:'',created_at:Math.floor(Date.now()/1000)-600},
    {id:'t_003',title:'💰 整理昨日欠款',body:'',priority:2,status:'ready',assignee:'',created_at:Math.floor(Date.now()/1000)-900},
    {id:'t_004',title:'📢 便民圈发布招工信息',body:'麻阳本地招工',priority:0,status:'ready',assignee:'',created_at:Math.floor(Date.now()/1000)-1800},
  ].map(t => {
    const pri = t.priority||0;
    return `<div class="card ${PRI_CLASS[pri]||'pri-low'}">
      <div class="card-title">${t.title}</div>
      <div class="card-id">${t.id} · <span class="status-tag s-ready">待办</span></div>
      ${t.body ? `<div class="card-body">${t.body}</div>` : ''}
      <div class="card-footer"><span>${t.assignee === 'hermes' ? '🤖 小财神' : '👤 华华'}</span><span class="time">刚刚</span></div>
    </div>`;
  }).join('');
  document.querySelector('#col-ready').parentElement.querySelector('.count').textContent = '4';
  document.getElementById('today-science').textContent = '矿泉水vs纯净水对比';
  document.getElementById('agent-status').textContent = '✅ 演示数据';
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
